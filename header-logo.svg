<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Circle Background -->
  <circle cx="20" cy="20" r="20" fill="url(#gradientBg)"/>
  
  <!-- Inner Tech Design -->
  <path d="M20 8 L32 14 L28 26 L12 26 L8 14 Z" fill="none" stroke="url(#gradientStroke)" stroke-width="1.5" stroke-linejoin="miter"/>
  
  <!-- Center Diamond -->
  <path d="M20 12 L24 18 L20 24 L16 18 Z" fill="url(#gradientDiamond)" opacity="0.8"/>
  
  <!-- Accent Lines -->
  <line x1="16" y1="18" x2="12" y2="16" stroke="url(#gradientAccent)" stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="18" x2="28" y2="16" stroke="url(#gradientAccent)" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Glow Effect -->
  <defs>
    <radialGradient id="gradientBg" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:0.1"/>
    </radialGradient>
    <linearGradient id="gradientStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradientDiamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradientAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
</svg>
